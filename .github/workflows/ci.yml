name: CI

on:
  workflow_dispatch:

jobs:
  build-and-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust compile check
        run: cargo check --workspace

      - name: API unit tests
        run: cargo test -p api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Web console quality checks
        working-directory: apps/web-console
        run: |
          npm ci
          npm run check:ui

  auth-rbac-integration:
    runs-on: ubuntu-latest
    needs: build-and-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloudops
          POSTGRES_PASSWORD: cloudops_ci
          POSTGRES_DB: cloudops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudops -d cloudops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://cloudops:cloudops_ci@127.0.0.1:5432/cloudops
      AUTH_RBAC_ENABLED: "true"
      AUTH_OIDC_ENABLED: "true"
      AUTH_OIDC_DEV_MODE_ENABLED: "true"
      AUTH_OIDC_REDIRECT_URI: http://127.0.0.1:8080/api/v1/auth/oidc/callback
      AUTH_OIDC_AUTO_PROVISION: "false"
      RUST_LOG: warn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Start API service
        run: |
          cargo run -p api >/tmp/api.log 2>&1 &
          echo $! >/tmp/api.pid

          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done

          echo "ERROR: API failed to start within timeout" >&2
          cat /tmp/api.log >&2 || true
          exit 1

      - name: Auth/RBAC integration suite
        run: |
          bash scripts/test-rbac-policy.sh
          bash scripts/test-oidc-dev.sh

      - name: Dump API logs on failure
        if: failure()
        run: cat /tmp/api.log || true

      - name: Stop API service
        if: always()
        run: |
          if [[ -f /tmp/api.pid ]]; then
            kill "$(cat /tmp/api.pid)" >/dev/null 2>&1 || true
          fi
