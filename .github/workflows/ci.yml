name: CI

on:
  workflow_dispatch:
    inputs:
      run_bench:
        description: "Run optional benchmark profile + gate + trend regression guard"
        required: false
        default: false
        type: boolean
      bench_profile:
        description: "Benchmark profile for optional bench job"
        required: false
        default: "scale-10k"
        type: string
      bench_baseline_api:
        description: "Baseline API summary csv used by trend/regression guard"
        required: false
        default: "benchmarks/baselines/scale-10k/api-summary.csv"
        type: string
      bench_baseline_sse:
        description: "Baseline SSE summary json used by trend/regression guard"
        required: false
        default: "benchmarks/baselines/scale-10k/sse-summary.json"
        type: string

jobs:
  build-and-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust compile check
        run: cargo check --workspace

      - name: API unit tests
        run: cargo test -p api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Web console quality checks
        working-directory: apps/web-console
        run: |
          npm ci
          npm run check:ui

  auth-rbac-integration:
    runs-on: ubuntu-latest
    needs: build-and-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloudops
          POSTGRES_PASSWORD: cloudops_ci
          POSTGRES_DB: cloudops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudops -d cloudops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://cloudops:cloudops_ci@127.0.0.1:5432/cloudops
      AUTH_RBAC_ENABLED: "true"
      AUTH_OIDC_ENABLED: "true"
      AUTH_OIDC_DEV_MODE_ENABLED: "true"
      AUTH_OIDC_REDIRECT_URI: http://127.0.0.1:8080/api/v1/auth/oidc/callback
      AUTH_OIDC_AUTO_PROVISION: "false"
      MONITORING_SECRET_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      RUST_LOG: warn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build API binary
        run: cargo build -p api

      - name: Start API service
        run: |
          target/debug/api >/tmp/api.log 2>&1 &
          echo $! >/tmp/api.pid

          for i in $(seq 1 180); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            if [[ -f /tmp/api.pid ]] && ! kill -0 "$(cat /tmp/api.pid)" >/dev/null 2>&1; then
              echo "ERROR: API process exited before readiness" >&2
              cat /tmp/api.log >&2 || true
              exit 1
            fi
            sleep 1
          done

          echo "ERROR: API failed to start within timeout" >&2
          cat /tmp/api.log >&2 || true
          exit 1

      - name: Auth/RBAC integration suite
        run: |
          bash scripts/test-rbac-policy.sh
          bash scripts/test-oidc-dev.sh

      - name: Dump API logs on failure
        if: failure()
        run: cat /tmp/api.log || true

      - name: Stop API service
        if: always()
        run: |
          if [[ -f /tmp/api.pid ]]; then
            kill "$(cat /tmp/api.pid)" >/dev/null 2>&1 || true
          fi

  benchmark-gate:
    if: ${{ inputs.run_bench }}
    runs-on: ubuntu-latest
    needs: build-and-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloudops
          POSTGRES_PASSWORD: cloudops_ci
          POSTGRES_DB: cloudops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudops -d cloudops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://cloudops:cloudops_ci@127.0.0.1:5432/cloudops
      AUTH_RBAC_ENABLED: "true"
      AUTH_OIDC_ENABLED: "true"
      AUTH_OIDC_DEV_MODE_ENABLED: "true"
      AUTH_OIDC_REDIRECT_URI: http://127.0.0.1:8080/api/v1/auth/oidc/callback
      AUTH_OIDC_AUTO_PROVISION: "false"
      MONITORING_SECRET_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      MONITORING_SYNC_BATCH_SIZE: "50"
      MONITORING_SYNC_MAX_PARALLEL: "8"
      RUST_LOG: warn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build API binary
        run: cargo build -p api

      - name: Start API service
        run: |
          target/debug/api >/tmp/api.log 2>&1 &
          echo $! >/tmp/api.pid

          for i in $(seq 1 180); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            if [[ -f /tmp/api.pid ]] && ! kill -0 "$(cat /tmp/api.pid)" >/dev/null 2>&1; then
              echo "ERROR: API process exited before readiness" >&2
              cat /tmp/api.log >&2 || true
              exit 1
            fi
            sleep 1
          done

          echo "ERROR: API failed to start within timeout" >&2
          cat /tmp/api.log >&2 || true
          exit 1

      - name: Run benchmark suites
        run: |
          RUN_ID="$(date -u +%Y%m%dT%H%M%SZ)"
          PROFILE_DIR=".run/benchmarks/profile-${{ inputs.bench_profile }}-${RUN_ID}"
          REGRESSION_DIR=".run/benchmarks/regression-${{ inputs.bench_profile }}-${RUN_ID}"

          bash scripts/benchmark-scale-profiles.sh \
            --profile "${{ inputs.bench_profile }}" \
            --output-dir "${PROFILE_DIR}" \
            --run-id "${RUN_ID}" \
            --baseline-api-summary "${{ inputs.bench_baseline_api }}" \
            --baseline-sse-summary "${{ inputs.bench_baseline_sse }}"

          bash scripts/benchmark-regression-guard.sh \
            --trend-summary "${PROFILE_DIR}/trend-delta/summary.json" \
            --profile "${{ inputs.bench_profile }}" \
            --output-dir "${REGRESSION_DIR}"

          echo "RUN_ID=${RUN_ID}" >>"${GITHUB_ENV}"
          echo "PROFILE_DIR=${PROFILE_DIR}" >>"${GITHUB_ENV}"
          echo "REGRESSION_DIR=${REGRESSION_DIR}" >>"${GITHUB_ENV}"
          echo "PROFILE_SUMMARY_MD=${PROFILE_DIR}/summary.md" >>"${GITHUB_ENV}"
          echo "GATE_SUMMARY_MD=${PROFILE_DIR}/gate/gate-summary.md" >>"${GITHUB_ENV}"
          echo "TREND_SUMMARY_MD=${PROFILE_DIR}/trend-delta/summary.md" >>"${GITHUB_ENV}"
          echo "REGRESSION_SUMMARY_MD=${REGRESSION_DIR}/summary.md" >>"${GITHUB_ENV}"

      - name: Publish benchmark summaries
        if: always()
        run: |
          {
            echo "## Benchmark Evidence"
            echo
            if [[ -f "${PROFILE_SUMMARY_MD}" ]]; then
              cat "${PROFILE_SUMMARY_MD}"
              echo
            else
              echo "- profile summary missing: \`${PROFILE_SUMMARY_MD}\`"
              echo
            fi
            if [[ -f "${GATE_SUMMARY_MD}" ]]; then
              cat "${GATE_SUMMARY_MD}"
              echo
            else
              echo "- gate summary missing: \`${GATE_SUMMARY_MD}\`"
              echo
            fi
            if [[ -f "${TREND_SUMMARY_MD}" ]]; then
              cat "${TREND_SUMMARY_MD}"
              echo
            else
              echo "- trend summary missing: \`${TREND_SUMMARY_MD}\`"
              echo
            fi
            if [[ -f "${REGRESSION_SUMMARY_MD}" ]]; then
              cat "${REGRESSION_SUMMARY_MD}"
            else
              echo "- regression summary missing: \`${REGRESSION_SUMMARY_MD}\`"
            fi
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-gate-${{ env.RUN_ID }}
          path: |
            ${{ env.PROFILE_DIR }}
            ${{ env.REGRESSION_DIR }}
          if-no-files-found: warn

      - name: Dump API logs on failure
        if: failure()
        run: cat /tmp/api.log || true

      - name: Stop API service
        if: always()
        run: |
          if [[ -f /tmp/api.pid ]]; then
            kill "$(cat /tmp/api.pid)" >/dev/null 2>&1 || true
          fi
