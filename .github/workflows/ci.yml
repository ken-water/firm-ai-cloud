name: CI

on:
  workflow_dispatch:
    inputs:
      run_bench:
        description: "Run optional benchmark threshold gate"
        required: false
        default: false
        type: boolean
      bench_api_concurrency:
        description: "API benchmark concurrency for optional bench job"
        required: false
        default: "10"
        type: string
      bench_burst_count:
        description: "SSE benchmark burst count for optional bench job"
        required: false
        default: "300"
        type: string

jobs:
  build-and-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Rust compile check
        run: cargo check --workspace

      - name: API unit tests
        run: cargo test -p api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web-console/package-lock.json

      - name: Web console quality checks
        working-directory: apps/web-console
        run: |
          npm ci
          npm run check:ui

  auth-rbac-integration:
    runs-on: ubuntu-latest
    needs: build-and-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloudops
          POSTGRES_PASSWORD: cloudops_ci
          POSTGRES_DB: cloudops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudops -d cloudops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://cloudops:cloudops_ci@127.0.0.1:5432/cloudops
      AUTH_RBAC_ENABLED: "true"
      AUTH_OIDC_ENABLED: "true"
      AUTH_OIDC_DEV_MODE_ENABLED: "true"
      AUTH_OIDC_REDIRECT_URI: http://127.0.0.1:8080/api/v1/auth/oidc/callback
      AUTH_OIDC_AUTO_PROVISION: "false"
      RUST_LOG: warn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build API binary
        run: cargo build -p api

      - name: Start API service
        run: |
          target/debug/api >/tmp/api.log 2>&1 &
          echo $! >/tmp/api.pid

          for i in $(seq 1 180); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            if [[ -f /tmp/api.pid ]] && ! kill -0 "$(cat /tmp/api.pid)" >/dev/null 2>&1; then
              echo "ERROR: API process exited before readiness" >&2
              cat /tmp/api.log >&2 || true
              exit 1
            fi
            sleep 1
          done

          echo "ERROR: API failed to start within timeout" >&2
          cat /tmp/api.log >&2 || true
          exit 1

      - name: Auth/RBAC integration suite
        run: |
          bash scripts/test-rbac-policy.sh
          bash scripts/test-oidc-dev.sh

      - name: Dump API logs on failure
        if: failure()
        run: cat /tmp/api.log || true

      - name: Stop API service
        if: always()
        run: |
          if [[ -f /tmp/api.pid ]]; then
            kill "$(cat /tmp/api.pid)" >/dev/null 2>&1 || true
          fi

  benchmark-gate:
    if: ${{ inputs.run_bench }}
    runs-on: ubuntu-latest
    needs: build-and-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloudops
          POSTGRES_PASSWORD: cloudops_ci
          POSTGRES_DB: cloudops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudops -d cloudops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://cloudops:cloudops_ci@127.0.0.1:5432/cloudops
      AUTH_RBAC_ENABLED: "true"
      AUTH_OIDC_ENABLED: "true"
      AUTH_OIDC_DEV_MODE_ENABLED: "true"
      AUTH_OIDC_REDIRECT_URI: http://127.0.0.1:8080/api/v1/auth/oidc/callback
      AUTH_OIDC_AUTO_PROVISION: "false"
      MONITORING_SYNC_BATCH_SIZE: "50"
      MONITORING_SYNC_MAX_PARALLEL: "8"
      RUST_LOG: warn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build API binary
        run: cargo build -p api

      - name: Start API service
        run: |
          target/debug/api >/tmp/api.log 2>&1 &
          echo $! >/tmp/api.pid

          for i in $(seq 1 180); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            if [[ -f /tmp/api.pid ]] && ! kill -0 "$(cat /tmp/api.pid)" >/dev/null 2>&1; then
              echo "ERROR: API process exited before readiness" >&2
              cat /tmp/api.log >&2 || true
              exit 1
            fi
            sleep 1
          done

          echo "ERROR: API failed to start within timeout" >&2
          cat /tmp/api.log >&2 || true
          exit 1

      - name: Run benchmark suites
        run: |
          RUN_ID="$(date -u +%Y%m%dT%H%M%SZ)"
          API_SEQ_DIR=".run/benchmarks/api-sequential-${RUN_ID}"
          API_CONC_DIR=".run/benchmarks/api-concurrency-${RUN_ID}"
          SSE_DIR=".run/benchmarks/sse-${RUN_ID}"
          GATE_DIR=".run/benchmarks/gate-${RUN_ID}"

          OUTPUT_DIR="${API_SEQ_DIR}" bash scripts/benchmark-api-load.sh --concurrency 1
          OUTPUT_DIR="${API_CONC_DIR}" bash scripts/benchmark-api-load.sh --concurrency "${{ inputs.bench_api_concurrency }}"
          OUTPUT_DIR="${SSE_DIR}" bash scripts/benchmark-sse-burst-smoke.sh --burst-count "${{ inputs.bench_burst_count }}"
          bash scripts/benchmark-threshold-gate.sh \
            --api-summary "${API_SEQ_DIR}/summary.csv" \
            --api-summary "${API_CONC_DIR}/summary.csv" \
            --sse-summary "${SSE_DIR}/summary.json" \
            --profile "ci-mixed" \
            --output-dir "${GATE_DIR}"

          echo "RUN_ID=${RUN_ID}" >>"${GITHUB_ENV}"
          echo "GATE_SUMMARY_MD=${GATE_DIR}/gate-summary.md" >>"${GITHUB_ENV}"

      - name: Publish gate summary
        if: always()
        run: |
          if [[ -f "${GATE_SUMMARY_MD}" ]]; then
            cat "${GATE_SUMMARY_MD}" >>"${GITHUB_STEP_SUMMARY}"
          else
            echo "benchmark gate summary not generated" >>"${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-gate-${{ env.RUN_ID }}
          path: |
            .run/benchmarks/api-sequential-${{ env.RUN_ID }}
            .run/benchmarks/api-concurrency-${{ env.RUN_ID }}
            .run/benchmarks/sse-${{ env.RUN_ID }}
            .run/benchmarks/gate-${{ env.RUN_ID }}
          if-no-files-found: warn

      - name: Dump API logs on failure
        if: failure()
        run: cat /tmp/api.log || true

      - name: Stop API service
        if: always()
        run: |
          if [[ -f /tmp/api.pid ]]; then
            kill "$(cat /tmp/api.pid)" >/dev/null 2>&1 || true
          fi
